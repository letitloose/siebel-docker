services:
  oracle19c:
    image: container-registry.oracle.com/database/enterprise
    container_name: oracle19c
    hostname: oraclehost
    ports:
      - "1521:1521"
      - "5500:5500"
    env_file: .env
    volumes:
      - oracle_data:/opt/oracle/oradata
      # - ./init-scripts:/opt/oracle/scripts/startup
      # - ./init-scripts:/docker-entrypoint-initdb.d
    shm_size: '2gb'
    restart: always

volumes:
  oracle_data:
