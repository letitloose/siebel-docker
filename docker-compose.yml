services:
  oracle19c:
    image: container-registry.oracle.com/database/enterprise_ru:latest-19
    container_name: db19sbl249
    hostname: db19sbl249
    networks:
      siebelnet:
        aliases:
          - db19sbl249
    ports:
      - "1521:1521"
      - "5500:5500"
    env_file: .env
    environment:
      ENABLE_ARCHIVELOG: "true"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./dumps:/opt/oracle/dumps
      - ./init-scripts/setup:/opt/oracle/scripts/setup
    shm_size: '2gb'
    restart: unless-stopped

networks:
  siebelnet:
    name: siebelnet

volumes:
  oracle_data:
